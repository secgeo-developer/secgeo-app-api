---
name: Checks

on: [push]

jobs:
  test-lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}  
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@v3
      - name: Test
        run: docker compose run --rm app sh -c "python manage.py wait_for_db && python manage.py test"
      - name: Lint
        run : docker compose run --rm app sh -c "flake8 ."
      - name: Format Check
        run : docker compose run --rm app sh -c "black --check ."
        # Bu kodu manuel çalıştırmamız gerekecek 
        # çünkü black --check komutu, kodun formatının doğru olup olmadığını kontrol eder 
        # ve eğer yanlışsa hata verir. Bu nedenle, bu adımı otomatik olarak çalıştırmak yerine, 
        #geliştiricilerin manuel olarak çalıştırarak kodlarını formatlamalarını sağlamak daha iyi olabilir.
        #docker compose run --rm app black .
